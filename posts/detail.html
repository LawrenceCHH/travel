<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>文章載入中... - 旅遊指南</title>
  <link rel="manifest" href="/travel/manifest.json">
  <link rel="icon" type="image/svg+xml" href="/travel/img/icons/icon.svg">
  <link rel="apple-touch-icon" href="/travel/img/icons/icon-192.png">
  <meta name="theme-color" content="#343434">
  <link rel="stylesheet" href="/assets/tailwind.css">
  <!-- marked.js CDN 用於解析 markdown -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div id="navbar-placeholder"></div>

  <!-- Page Header -->
  <header id="post-header" class="masthead" style="background-image: url('/travel/img/bg-post.jpg')">
    <div class="overlay"></div>
    <div class="mx-auto max-w-3xl px-5">
      <div class="post-heading text-center text-white">
        <h1 id="post-title" class="text-4xl md:text-5xl font-bold leading-tight"></h1>
        <h2 id="post-subtitle" class="subheading text-xl md:text-2xl font-normal mt-2 text-gray-200"></h2>
        <span class="meta flex flex-col items-center mt-6 text-sm text-gray-300">
          <div id="post-meta-info"></div>
          <div id="post-tags" class="mt-3 flex flex-wrap gap-2.5 justify-center text-sm font-semibold text-blue-200"></div>
        </span>
      </div>
    </div>
  </header>

  <!-- Post Content -->
  <article class="mx-auto max-w-3xl px-5 py-8 my-4 bg-white">
    <div id="post-content" class="prose max-w-none">
      <p class="text-center text-muted-text py-12">文章內容載入中...</p>
    </div>

    <hr class="my-8 border-sand">

    <!-- Navigation -->
    <div class="flex justify-between items-center my-8">
      <div id="prev-post-container"></div>
      <div id="next-post-container"></div>
    </div>
  </article>

  <div id="footer-placeholder"></div>

  <script type="module" src="/assets/scripts.js"></script>
  
  <script>
    document.addEventListener("DOMContentLoaded", async function() {
      const base = '/travel/';
      const params = new URLSearchParams(window.location.search);
      const postId = params.get('id');
      if (!postId) {
        document.getElementById('post-content').innerHTML = '<p class="text-red-500 text-center py-8">未指定文章識別碼。</p>';
        return;
      }

      try {
        // 1. 取得所有文章元資料
        const res = await fetch(`${base}data/posts.json`);
        if (!res.ok) throw new Error("Metadata fetch failed");
        const posts = await res.json();
        
        const index = posts.findIndex(p => p.id === postId);
        if (index === -1) {
          document.getElementById('post-content').innerHTML = '<p class="text-red-500 text-center py-8">找不到該文章。</p>';
          return;
        }

        const post = posts[index];

        // 2. 更新頁面標題與 Meta
        document.title = `${post.title} - 旅遊指南`;

        // 3. 設定 Banner 背景與標題
        const header = document.getElementById('post-header');
        if (post.background) {
          header.style.backgroundImage = `url('${base}${post.background.replace(/^\//, '')}')`;
        }

        document.getElementById('post-title').textContent = post.title;
        document.getElementById('post-subtitle').textContent = post.subtitle;

        // 4. 設定文章元資料與閱讀時間
        const dateObj = new Date(post.date);
        const formattedDate = isNaN(dateObj.getTime())
          ? post.date
          : `${dateObj.getFullYear()}年${String(dateObj.getMonth() + 1).padStart(2, '0')}月${String(dateObj.getDate()).padStart(2, '0')}日`;
        document.getElementById('post-meta-info').innerHTML = `${formattedDate} &middot; <span class="reading-time" title="預估閱讀時間">${post.readTime}</span>`;

        // 5. 設定標籤
        const tagsContainer = document.getElementById('post-tags');
        if (post.tags && post.tags.length > 0) {
          tagsContainer.innerHTML = post.tags.map(tag => `<span>#${tag}</span>`).join('');
        } else {
          tagsContainer.style.display = 'none';
        }

        // 6. 讀取文章檔案
        const contentRes = await fetch(`${base}${post.markdownPath}`);
        if (!contentRes.ok) throw new Error("Failed to fetch post raw content");
        const rawContent = await contentRes.text();

        // 7. 剝除 Front Matter (即首尾的 --- 區塊)
        let cleanContent = rawContent;
        if (rawContent.startsWith('---')) {
          const nextDashIndex = rawContent.indexOf('---', 3);
          if (nextDashIndex !== -1) {
            cleanContent = rawContent.slice(nextDashIndex + 3).trim();
          }
        }

        // 8. 依據檔案類型渲染
        const isMarkdown = post.markdownPath.endsWith('.md');
        const contentContainer = document.getElementById('post-content');
        if (isMarkdown) {
          if (typeof marked !== 'undefined') {
            contentContainer.innerHTML = marked.parse(cleanContent);
          } else {
            contentContainer.textContent = cleanContent;
          }
        } else {
          // HTML 文章檔直接注入
          contentContainer.innerHTML = cleanContent;
        }

        // 8b. 表格橫向捲動修正：避免窄螢幕被撐破版
        contentContainer.querySelectorAll('table').forEach(table => {
          const wrapper = document.createElement('div');
          wrapper.className = 'overflow-x-auto';
          table.parentNode.insertBefore(wrapper, table);
          wrapper.appendChild(table);
        });

        // 9. 上下一篇導覽 (Jekyll 排序為新到舊，即 posts[0] 最新)
        // 舊文章 (Previous) 在 posts 陣列 index + 1，新文章 (Next) 在 index - 1
        const prevPost = posts[index + 1]; // 較舊的
        const nextPost = posts[index - 1]; // 較新的

        const prevContainer = document.getElementById('prev-post-container');
        if (prevPost) {
          prevContainer.innerHTML = `
            <a class="btn-primary" href="${base}posts/detail.html?id=${prevPost.id}" title="${prevPost.title}">
              &larr; 上一篇<span class="hidden md:inline">文章</span>
            </a>
          `;
        }

        const nextContainer = document.getElementById('next-post-container');
        if (nextPost) {
          nextContainer.innerHTML = `
            <a class="btn-primary" href="${base}posts/detail.html?id=${nextPost.id}" title="${nextPost.title}">
              下一篇<span class="hidden md:inline">文章</span> &rarr;
            </a>
          `;
        }

      } catch (err) {
        console.error("Failed to render post detail:", err);
        document.getElementById('post-content').innerHTML = `<p class="text-red-500 text-center py-8">載入文章內容失敗: ${err.message}</p>`;
      }
    });
  </script>
</body>
</html>
