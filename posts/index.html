---
layout: page
title: 文章目錄
background: '/img/bg-post.jpg'
---

<!-- Tag Filter Container -->
<div id="tag-filter-container" class="mt-4 mb-6"></div>

<div class="overflow-x-auto">
  <table class="w-full text-left border-collapse my-6">
    <tbody id="archive-table-body">
      {% for post in site.posts %}
      <tr class="archive-row border-b border-gray-200 hover:bg-gray-50 transition-colors duration-150"
          data-tags="{{ post.tags | join: ',' }}">
        <td class="py-3 px-4 text-gray-600 font-mono text-sm w-1/4">{{ post.date | date: "%Y-%m-%d" }}</td>
        <td class="py-3 px-4">
          <div class="flex flex-col gap-1.5">
            <a class="text-gray-900 font-bold hover:text-primary no-underline" href="{{ post.url | prepend: site.baseurl | replace: '//', '/' }}">{{ post.title }}</a>
            {% if post.tags.size > 0 %}
            <div class="flex flex-wrap gap-1.5">
              {% for tag in post.tags %}
              <span class="inline-block px-2 py-0.5 text-xs font-semibold rounded bg-gray-100 text-gray-600">{{ tag }}</span>
              {% endfor %}
            </div>
            {% endif %}
          </div>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>

<!-- Pagination Container -->
<div id="pagination-container" class="mt-8 mb-12"></div>

<script>
  document.addEventListener("DOMContentLoaded", function() {
    if (typeof window.initPagination === 'function') {
      window.initPagination({
        containerId: 'archive-table-body',
        paginationId: 'pagination-container',
        tagContainerId: 'tag-filter-container',
        pageSize: 5,
        itemSelector: '.archive-row',
        forceShow: true
      });
    }
  });
</script>
