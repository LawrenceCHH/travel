---
layout: page
title: 文章目錄
background: '/img/bg-post.jpg'
---

<!-- Filter & Search Bar -->
<div class="flex flex-row justify-end items-center gap-3 mt-6 mb-8 w-full">
  <div id="tag-filter-container" class="w-1/2 max-w-[180px] md:max-w-[200px]"></div>
  <div id="search-container" class="w-1/2 max-w-[180px] md:max-w-[200px]"></div>
</div>

<div class="overflow-x-auto">
  <table class="w-full text-left border-collapse my-6">
    <tbody id="archive-table-body">
      {% for post in site.posts %}
      <tr class="archive-row border-b border-gray-200 hover:bg-gray-50 transition-colors duration-150"
          data-tags="{{ post.tags | join: ',' }}">
        <td class="py-3 px-4 text-gray-600 font-mono text-sm w-1/4">{{ post.date | date: "%Y-%m-%d" }}</td>
        <td class="py-3 px-4">
          <div class="flex flex-col gap-1 w-full max-w-[180px] sm:max-w-[300px] md:max-w-[400px] lg:max-w-[500px]">
            <a class="text-gray-900 font-bold hover:text-primary no-underline" href="{{ post.url | prepend: site.baseurl | replace: '//', '/' }}">{{ post.title }}</a>
            {% if post.tags.size > 0 %}
            <div class="truncate text-xs text-gray-500 w-full" title="{{ post.tags | join: ', ' }}">
              {% for tag in post.tags %}
              <span class="mr-2">#{{ tag }}</span>
              {% endfor %}
            </div>
            {% endif %}
          </div>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>

<!-- Pagination Container -->
<div id="pagination-container" class="mt-8 mb-12"></div>

<script>
  document.addEventListener("DOMContentLoaded", function() {
    if (typeof window.initPagination === 'function') {
      window.initPagination({
        containerId: 'archive-table-body',
        paginationId: 'pagination-container',
        tagContainerId: 'tag-filter-container',
        searchContainerId: 'search-container',
        pageSize: 5,
        itemSelector: '.archive-row',
        forceShow: true
      });
    }
  });
</script>
