<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>首頁 - 旅遊指南</title>
  <link rel="manifest" href="/travel/manifest.json">
  <link rel="icon" type="image/svg+xml" href="/travel/img/icons/icon.svg">
  <link rel="apple-touch-icon" href="/travel/img/icons/icon-192.png">
  <meta name="theme-color" content="#343434">
  <link rel="stylesheet" href="/assets/tailwind.css">
</head>
<body>
  <div id="navbar-placeholder"></div>

  <!-- Page Header -->
  <header class="masthead" style="background-image: url('/travel/img/bg-index.jpg')">
    <div class="overlay"></div>
    <div class="mx-auto max-w-3xl px-5">
      <div class="page-heading">
        <h1>旅遊指南</h1>
        <span class="subheading">Travel Guide</span>
      </div>
    </div>
  </header>

  <div class="mx-auto max-w-3xl px-5">
    <!-- Home Post List Container -->
    <div id="posts-container" class="space-y-4">
      <p class="text-center text-muted-text py-8">文章載入中...</p>
    </div>

    <!-- Pagination Container -->
    <div id="pagination-container" class="mt-8 mb-12"></div>
  </div>

  <div id="footer-placeholder"></div>

  <script type="module" src="/assets/scripts.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async function() {
      const base = '/travel/';
      try {
        const res = await fetch(`${base}data/posts.json`);
        if (!res.ok) throw new Error("Metadata JSON fetch failed");
        const posts = await res.json();
        
        const container = document.getElementById('posts-container');
        container.innerHTML = '';
        
        posts.forEach(post => {
          const article = document.createElement('article');
          article.className = 'post-preview post-card border-b border-sand pb-6 mb-6';
          
          const dateObj = new Date(post.date);
          const formattedDate = isNaN(dateObj.getTime()) 
            ? post.date 
            : `${dateObj.getFullYear()}年${String(dateObj.getMonth() + 1).padStart(2, '0')}月${String(dateObj.getDate()).padStart(2, '0')}日`;

          article.innerHTML = `
            <a href="${base}posts/detail.html?id=${post.id}">
              <h2 class="post-title text-2xl font-bold text-ink hover:text-primary transition-colors duration-150">${post.title}</h2>
              <h3 class="post-subtitle text-lg font-normal text-muted-text mt-1">${post.subtitle || ''}</h3>
            </a>
            <p class="post-meta text-sm text-muted-text mt-3">
              ${formattedDate} &middot; <span class="reading-time" title="預估閱讀時間">${post.readTime}</span>
            </p>
          `;
          container.appendChild(article);
        });

        // 呼叫分頁器，每頁 5 篇
        if (typeof window.initPagination === 'function') {
          window.initPagination({
            containerId: 'posts-container',
            paginationId: 'pagination-container',
            pageSize: 5,
            itemSelector: '.post-card',
            forceShow: true
          });
        }
      } catch (err) {
        console.error("Failed to load posts index:", err);
        document.getElementById('posts-container').innerHTML = '<p class="text-center text-red-500 py-8">無法載入文章列表，請稍後再試。</p>';
      }
    });
  </script>
</body>
</html>
