<script src="{{"/assets/scripts.js" | relative_url }}"></script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('{{ "/sw.js" | relative_url }}').catch(function () {});
    });
  }
</script>

{% if page.url contains 'contact' %}
  <!-- Contact form: submit via fetch() to Formspree, no jQuery -->
  <script>
    (function () {
      var form = document.getElementById('contactForm');
      var button = document.getElementById('sendMessageButton');
      var successBox = document.getElementById('success');

      // TODO: replace with your own Formspree form ID (https://formspree.io/forms) — the
      // old `//formspree.io/{{ site.email }}` endpoint format shown in the previous version
      // of this file has been retired by Formspree and no longer delivers mail.
      var FORMSPREE_ENDPOINT = 'https://formspree.io/f/YOUR_FORM_ID';

      form.addEventListener('submit', function (event) {
        event.preventDefault();
        button.disabled = true;

        fetch(FORMSPREE_ENDPOINT, {
          method: 'POST',
          headers: { 'Accept': 'application/json' },
          body: new FormData(form)
        }).then(function (response) {
          if (response.ok) {
            successBox.innerHTML = '<div class="rounded bg-green-50 border border-green-200 text-green-800 px-4 py-3">您的建議已成功送出！</div>';
            form.reset();
          } else {
            throw new Error('Form submission failed');
          }
        }).catch(function () {
          successBox.innerHTML = '<div class="rounded bg-red-50 border border-red-200 text-red-800 px-4 py-3">抱歉，郵件伺服器似乎沒有回應，請稍後再試！</div>';
        }).finally(function () {
          setTimeout(function () { button.disabled = false; }, 1000);
        });
      });

      form.querySelector('#name').addEventListener('focus', function () {
        successBox.innerHTML = '';
      });
    })();
  </script>
{% endif %}
