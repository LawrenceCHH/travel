<p>Want to get in touch? Fill out the form below to send me a message and I will get back to you as soon as possible!</p>
<form name="sentMessage" id="contactForm" class="space-y-5">
  <div>
    <label for="name" class="mb-1 block font-sans text-sm font-bold text-gray-800">Name</label>
    <input type="text" name="name" class="w-full border border-gray-300 px-3 py-2 focus:border-primary focus:outline-none" placeholder="Name" id="name" required>
  </div>
  <div>
    <label for="email" class="mb-1 block font-sans text-sm font-bold text-gray-800">Email Address</label>
    <input type="email" name="email" class="w-full border border-gray-300 px-3 py-2 focus:border-primary focus:outline-none" placeholder="Email Address" id="email" required>
  </div>
  <div>
    <label for="phone" class="mb-1 block font-sans text-sm font-bold text-gray-800">Phone Number</label>
    <input type="tel" name="phone" class="w-full border border-gray-300 px-3 py-2 focus:border-primary focus:outline-none" placeholder="Phone Number" id="phone" required>
  </div>
  <div>
    <label for="message" class="mb-1 block font-sans text-sm font-bold text-gray-800">Message</label>
    <textarea rows="5" name="message" class="w-full border border-gray-300 px-3 py-2 focus:border-primary focus:outline-none" placeholder="Message" id="message" required></textarea>
  </div>
  <div id="success"></div>
  <div>
    <button type="submit" class="btn-primary" id="sendMessageButton">Send</button>
  </div>
</form>
