---
layout: page
title: 建議
description: 有任何想說的話嗎？歡迎填寫表單與我聯絡。
background: '/img/bg-contact.jpg'
form: true
---

<p>想要提供建議或與我聯絡嗎？請填寫下方的表單送出您的建議，我會盡快回覆您！</p>
<form name="sentMessage" id="contactForm" class="space-y-5">
  <div>
    <label for="name" class="mb-1 block font-sans text-sm font-bold text-gray-800">您的姓名</label>
    <input type="text" name="name" class="w-full border border-gray-300 px-3 py-2 focus:border-primary focus:outline-none" placeholder="請輸入姓名" id="name" required>
  </div>
  <div>
    <label for="email" class="mb-1 block font-sans text-sm font-bold text-gray-800">電子郵件信箱</label>
    <input type="email" name="email" class="w-full border border-gray-300 px-3 py-2 focus:border-primary focus:outline-none" placeholder="請輸入電子郵件" id="email" required>
  </div>
  <div>
    <label for="phone" class="mb-1 block font-sans text-sm font-bold text-gray-800">聯絡電話</label>
    <input type="tel" name="phone" class="w-full border border-gray-300 px-3 py-2 focus:border-primary focus:outline-none" placeholder="請輸入電話號碼" id="phone" required>
  </div>
  <div>
    <label for="message" class="mb-1 block font-sans text-sm font-bold text-gray-800">建議內容</label>
    <textarea rows="5" name="message" class="w-full border border-gray-300 px-3 py-2 focus:border-primary focus:outline-none" placeholder="請輸入您想對我說的話..." id="message" required></textarea>
  </div>
  <div id="success"></div>
  <div>
    <button type="submit" class="btn-primary" id="sendMessageButton">送出建議</button>
  </div>
</form>
