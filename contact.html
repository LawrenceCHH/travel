<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>建議 - 旅遊指南</title>
  <link rel="manifest" href="/travel/manifest.json">
  <link rel="icon" type="image/svg+xml" href="/travel/img/icons/icon.svg">
  <link rel="apple-touch-icon" href="/travel/img/icons/icon-192.png">
  <meta name="theme-color" content="#FFFFFF">
  <link rel="stylesheet" href="/assets/tailwind.css">
</head>
<body>
  <div id="navbar-placeholder"></div>

  <!-- Page Header -->
  <header class="masthead" style="background-image: url('/travel/img/bg-contact.jpg')">
    <div class="overlay"></div>
    <div class="mx-auto max-w-3xl px-5">
      <div class="page-heading">
        <h1>建議</h1>
        <span class="subheading">有任何問題歡迎填寫表單與我聯絡。</span>
      </div>
    </div>
  </header>

  <div class="mx-auto max-w-3xl px-5 py-10 my-4 bg-surface">
    <div class="mx-auto max-w-xl">
      <p class="mb-6 text-muted-text text-center">想要提供建議嗎？請填寫下方的表單送出您的建議，我會盡快回覆您！</p>
      <form name="sentMessage" id="contactForm" class="space-y-5">
        <div>
          <label for="name" class="mb-1 block font-sans text-sm font-bold text-ink">您的暱稱</label>
          <input type="text" name="name" class="w-full rounded border border-sand bg-surface px-3 py-2 text-sm text-ink shadow-sm focus:border-primary focus:outline-none" placeholder="請輸入暱稱" id="name" required>
        </div>
        <div>
          <label for="email" class="mb-1 block font-sans text-sm font-bold text-ink">電子郵件信箱</label>
          <input type="email" name="email" class="w-full rounded border border-sand bg-surface px-3 py-2 text-sm text-ink shadow-sm focus:border-primary focus:outline-none" placeholder="請輸入電子郵件" id="email" required>
        </div>
        <div>
          <label for="message" class="mb-1 block font-sans text-sm font-bold text-ink">建議內容</label>
          <textarea rows="5" name="message" class="w-full rounded border border-sand bg-surface px-3 py-2 text-sm text-ink shadow-sm focus:border-primary focus:outline-none" placeholder="請輸入您想提供的建議..." id="message" required></textarea>
        </div>
        <div id="success" class="text-center text-sm font-semibold"></div>
        <div>
          <button type="submit" class="btn-primary" id="sendMessageButton">送出建議</button>
        </div>
      </form>
    </div>
  </div>

  <div id="footer-placeholder"></div>

  <script type="module" src="/assets/scripts.js"></script>
  <!-- Google Apps Script 聯絡表單專屬邏輯 -->
  <script>
    (function () {
      var form = document.getElementById('contactForm');
      var button = document.getElementById('sendMessageButton');
      var successBox = document.getElementById('success');
      var GOOGLE_SCRIPT_ENDPOINT = 'https://script.google.com/macros/s/AKfycbxZGBV_UaqQB1ywUa84zmWzA6hgt4d65Ky4VrQSuFdp6_NP6RYu9iJXg-0BA0O-SeCj/exec';

      form.addEventListener('submit', function (event) {
        event.preventDefault();
        button.disabled = true;

        fetch(GOOGLE_SCRIPT_ENDPOINT, {
          method: 'POST',
          body: new FormData(form)
        }).then(function (response) {
          if (response.ok) {
            successBox.innerHTML = '<span class="text-primary">您的建議已成功送出！</span>';
            form.reset();
          } else {
            throw new Error('Form submission failed');
          }
        }).catch(function (error) {
          console.error('Error submitting form:', error);
          successBox.innerHTML = '<span class="text-red-500">抱歉，郵件伺服器似乎沒有回應，請稍後再試！</span>';
        }).finally(function () {
          setTimeout(function () { button.disabled = false; }, 1000);
        });
      });

      form.querySelector('#name').addEventListener('focus', function () {
        successBox.innerHTML = '';
      });
    })();
  </script>
</body>
</html>
